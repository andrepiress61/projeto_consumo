<div class="login-page">
  <div class="login-container">
    <span class="titulo-topo"></span>

    <div class="logo-area">
      <img src="/assets/logo-ecototally.png" alt="Logo EcoTotally" class="logo" />
    </div>

    <div class="login-card">
      <h1>LOGIN</h1>

      <label for="email">Email</label>
      <input
        id="email"
        type="email"
        [(ngModel)]="email"
        placeholder="nome@gmail.com"
      />

      <label for="senha">Senha</label>
      <div class="senha-box">
        <input
          id="senha"
          [type]="mostrarSenha ? 'text' : 'password'"
          [(ngModel)]="senha"
          placeholder="••••••••••••"
        />
        <button type="button" class="btn-olho" (click)="alternarSenha()">
          👁
        </button>
      </div>

      <button class="btn-entrar" (click)="entrar()">Entrar</button>

      <hr />

      <button class="btn-criar" (click)="irParaCadastro()">
        Criar nova conta
      </button>
    </div>
  </div>
</div>
